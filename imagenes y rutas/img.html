<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citar una imagén</title>
</head>
<body>
    <h1>Citar una imagén</h1>
    <p>Para citar una imagén, src hace referencia a donde vamos a ir a buscar esa imagén para que se muestre, alt es un texto alternativo que se muestra en caso de que la imagén no cargue correctamente o la ruta se rompa, este texto alternativo debe describir de que trataba esa imagén</p>
    <img src="images/océano-atlántico.jpg" alt="Océano atlántico">
</body>
